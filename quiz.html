<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Lab | Math Analytics Studio</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark">QL</div>
          <div class="brand-copy">
            <strong>Quiz Lab</strong>
            <span>Timed mathematics assessment</span>
          </div>
        </div>
        <nav class="nav-links">
          <a class="nav-link" href="./student.html">Dashboard</a>
          <a class="nav-link active" href="./quiz.html">Quiz Lab</a>
          <a class="nav-link" href="./result.html">Latest Result</a>
        </nav>
        <div class="topbar-meta">
          <div class="meta-chip"><span data-user-name></span> · <span data-role-label></span></div>
          <button class="ghost-button" data-logout>Logout</button>
        </div>
      </header>

      <div class="quiz-layout">
        <section class="question-card">
          <div class="question-meta">
            <span id="questionIndex">Question 1</span>
            <span id="questionTopic">Topic</span>
            <span id="questionDifficulty">Difficulty</span>
            <span class="timer-pill">On this question: <strong id="questionTimer">0m 0s</strong></span>
            <span class="timer-pill">Expected: <strong id="expectedTimer">0m 0s</strong></span>
          </div>
          <h2 id="questionPrompt">Question prompt</h2>
          <div id="questionInput"></div>
          <p id="quizMessage" class="status-message" style="margin-top: 20px;">Quiz in progress.</p>
          <div class="question-actions" style="margin-top: 20px;">
            <button id="previousQuestion" class="secondary-button" type="button">Previous</button>
            <button id="nextQuestion" class="secondary-button" type="button">Next</button>
            <button id="submitQuiz" class="primary-button" type="button">Submit quiz</button>
            <button id="viewLastResult" class="ghost-button hidden" type="button">View last result</button>
          </div>
        </section>

        <aside class="side-card">
          <div class="section-heading">
            <div>
              <span class="eyebrow">Question map</span>
              <h2>Progress</h2>
            </div>
          </div>
          <div id="questionPalette" class="palette-grid"></div>
          <div class="kpi-strip">
            <div class="kpi-chip">12-question mixed quiz</div>
            <div class="kpi-chip">MCQ + numeric answers</div>
            <div class="kpi-chip">Topics: algebra, trig, calculus</div>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="./js/pages/quiz.js"></script>
  </body>
</html>
